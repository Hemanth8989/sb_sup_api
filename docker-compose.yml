name: stonebridge

services:
  api:
    build:
      context: .
      dockerfile: src/StoneBridge.Api/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=stonebridge;Username=stonebridge_api;Password=changeme;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100;"
      ConnectionStrings__Redis: ""
      Clerk__Authority: "https://your-clerk-instance.clerk.accounts.dev"
      Clerk__Audience:  "your-api-audience"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stonebridge-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       stonebridge
      POSTGRES_USER:     stonebridge_api
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stonebridge_api -d stonebridge"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - stonebridge-net
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c max_connections=100
        -c log_min_duration_statement=500

volumes:
  postgres-data:

networks:
  stonebridge-net:
    driver: bridge